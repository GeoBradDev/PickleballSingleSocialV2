databases:
  - name: Pickleball Singles Social Database
    plan: basic-256mb
    databaseName: pickleball
    user: pickleball

services:
  - type: web
    name: Pickleball Singles Social API
    runtime: python
    plan: starter
    rootDir: backend
    region: oregon
    branch: prod
    buildCommand: ./build.sh
    startCommand: gunicorn PickleballSinglesSocialV2.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: Pickleball Singles Social Database
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.14.0"
      - key: ALLOWED_HOSTS
        value: pickleballsinglessocial-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://pickleballsinglessocial.com,https://www.pickleballsinglessocial.com,https://pickleballsinglessocial.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://pickleballsinglessocial.com,https://www.pickleballsinglessocial.com,https://pickleballsinglessocial.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MAILERLITE_API_KEY
        sync: false
      - key: MAILERLITE_GROUP_25_45
        sync: false
      - key: MAILERLITE_GROUP_45_PLUS
        sync: false

  - type: cron
    name: Pickleball Singles Social CRON Job
    runtime: python
    plan: starter
    rootDir: backend
    region: oregon
    branch: prod
    buildCommand: ./build.sh
    schedule: "0 * * * *"
    startCommand: python manage.py expire_stale_registrations; python manage.py send_marketing_emails
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: Pickleball Singles Social Database
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.14.0"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MAILERLITE_API_KEY
        sync: false
      - key: MAILERLITE_GROUP_25_45
        sync: false
      - key: MAILERLITE_GROUP_45_PLUS
        sync: false

  - type: web
    name: Pickleball Singles Social Frontend
    runtime: static
    rootDir: frontend
    branch: prod
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://pickleballsinglessocial-api.onrender.com
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
