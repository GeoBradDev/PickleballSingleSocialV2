databases:
  - name: pickleballsinglessocial-db
    plan: starter
    databaseName: pickleball
    user: pickleball

services:
  - type: web
    name: pickleballsinglessocial-api
    runtime: python
    plan: starter
    rootDir: backend
    region: oregon
    branch: prod
    buildCommand: ./build.sh
    startCommand: gunicorn PickleballSinglesSocialV2.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pickleballsinglessocial-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.14.0"
      - key: ALLOWED_HOSTS
        value: pickleballsinglessocial-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://pickleballsinglessocial.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://pickleballsinglessocial.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MAILERLITE_API_KEY
        sync: false

  - type: cron
    name: pickleballsinglessocial-cron
    runtime: python
    plan: starter
    rootDir: backend
    region: oregon
    branch: prod
    buildCommand: ./build.sh
    schedule: "0 * * * *"
    startCommand: python manage.py expire_stale_registrations
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pickleballsinglessocial-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.14.0"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: web
    name: pickleballsinglessocial
    runtime: static
    plan: free
    rootDir: frontend
    branch: prod
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://pickleballsinglessocial-api.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
